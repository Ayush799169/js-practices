<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students Results</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h1>Students Results</h1>
<label for="Student-Name">Name</label>
<input type="text" id="Student-Name" placeholder="Enter Student Name">
        <form action="">
            <label for="Hindi">Hindi</label>
            <input type="number" id="Hindi" placeholder="Enter Hindi Marks">
            <label for="English">English</label>
            <input type="number" id="English" placeholder="Enter English Marks">
            <label for="Science">Science</label>
            <input type="number" id="Science" placeholder="Enter Science Marks">
            <label for="Maths">Maths</label>
            <input type="number" id="Maths" placeholder="Enter Maths Marks">
            <label for="social-science">Social Science</label>
            <input type="number" id="social-science" placeholder="Enter Social Science Marks">
            <button type="button" id="submit">Submit</button>
        </form>
        <div id="total-marks">
        <div id="Grade"></div>
        <div id="pass-fail"></div>
        <div id="percentage"></div>
    </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
